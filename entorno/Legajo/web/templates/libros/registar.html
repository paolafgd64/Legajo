<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Libro</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            background-color: #3f51b5;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background-color: #283593;
        }
        .error {
            color: red;
            font-size: 12px;
        }
    </style>
</head>
<body>

<h1>Registrar Libro</h1>

<form id="registrarLibroForm">
    
    <div class="form-group">
        <label for="titulo">Título:</label>
        <input type="text" id="titulo" name="titulo" placeholder="Título del libro" required>
    </div>

    <div class="form-group">
        <label for="autor">Autor:</label>
        <input type="text" id="autor" name="autor" placeholder="Nombre y Apellido del autor" required>
    </div>

    <div class="form-group">
        <label for="genero">Género:</label>
        <select id="genero" name="genero" required>
            <option value="">Seleccione un género</option>
            <option value="Ficción">Ficción</option>
            <option value="Fantasía">Fantasía</option>
            <option value="Ciencia Ficción">Ciencia Ficción</option>
            <option value="Misterio">Misterio</option>
            <option value="Romance">Romance</option>
            <option value="Terror">Terror</option>
            <option value="Biografía">Biografía</option>
            <option value="Autoayuda">Autoayuda</option>
            <option value="Aventura">Aventura</option>
            <option value="Drama">Drama</option>
        </select>
    </div>

    <div class="form-group">
        <label for="sinopsis">Sinopsis:</label>
        <textarea id="sinopsis" name="sinopsis" placeholder="Escribe aquí la sinopsis..." required></textarea>
    </div>

    <div class="form-group">
        <label for="imagen">Portada (Imagen):</label>
        <input type="file" id="imagen" name="imagen" accept="image/*">
    </div>

    <button type="submit">Guardar Libro</button>
</form>

<script src="/js/registrarLibro.js"></script>

</body>
</html>
