{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>

    <link rel="stylesheet" href="{% static 'web/css/styles.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<a href="{% url 'index' %}" class="btn-volver">←</a>

<button id="toggleModo" class="modo-toggle">☀️ Modo Claro</button>

<section class="formulario">

    <form id="loginForm">
        
        {% csrf_token %} <!-- 🔥 IMPORTANTE -->

        <div class="logo-form"></div>
        <h2>Iniciar sesión</h2>

        <input type="email" id="correo" name="correo" placeholder="Correo electrónico" required />

        <div class="input-pass">
            <input type="password" id="clave" name="clave" placeholder="Contraseña" required />
            <i class="toggle-pass fas fa-eye" onclick="verClave('clave', this)"></i>
            <a href="{% url 'forgot_password' %}">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit">Ingresar</button>
    </form>

    <div id="loginMensaje" style="margin-top:10px;color:red"></div>

</section>

<!-- Scripts -->
<script src="{% static 'web/js/script.js' %}"></script>
<script src="{% static 'web/js/validaciones.js' %}"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {

        const form = document.getElementById('loginForm');
        const mensaje = document.getElementById('loginMensaje');

        // 🔥 FUNCIÓN CSRF
        function getCSRFToken() {
            return document.querySelector('[name=csrfmiddlewaretoken]').value;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            mensaje.textContent = '';

            const correo = document.getElementById('correo').value;
            const clave = document.getElementById('clave').value;

            try {
                const res = await fetch('/api/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCSRFToken()
                    },
                    body: JSON.stringify({
                        correo: correo,
                        clave: clave
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    mensaje.textContent = data.error || 'Credenciales inválidas';
                    return;
                }

                // 🔥 Guardar token (simulado)
                localStorage.setItem('jwtToken', data.token);

                // 🔥 Redirección por rol
                const role = (data.role || '').toLowerCase();

                if (role.includes('admin')) {
                    window.location.href = "{% url 'dashboard_admin' %}";
                } else {
                    window.location.href = "{% url 'dashboard_usuario' %}";
                }

            } catch (err) {
                console.error(err);
                mensaje.textContent = 'Error de red: ' + err.message;
            }
        });
    });
</script>

</body>
</html>
