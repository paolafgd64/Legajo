{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contrasena - Legajo</title>
    <link rel="stylesheet" href="{% static 'web/css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'web/css/password-recovery.css' %}">
</head>
<body>
    <button id="toggleModo" class="modo-toggle">Modo Claro</button>

    <div class="container-recuperar">
        <div class="header-recuperar">
            <div class="icon-recuperar">Pwd</div>
            <h1>Restablecer Contrasena</h1>
            <p>Ingresa tu nueva contrasena</p>
        </div>

        <form action="{% url 'reset_password' %}" method="post" id="resetForm">
            {% csrf_token %}
            <div class="form-group">
                <label for="password">Nueva Contrasena</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Contrasena</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>

            <button type="submit" class="btn-primary">Restablecer Contrasena</button>
        </form>

        <div class="footer-recuperar">
            <p>Necesitas ayuda? <a href="{% url 'forgot_password' %}">Solicitar otro enlace</a></p>
        </div>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        if (resetForm) {
            resetForm.addEventListener('submit', function (e) {
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (password !== confirmPassword) {
                    e.preventDefault();
                    alert('Las contrasenas no coinciden');
                }
            });
        }
    </script>

    <script src="{% static 'web/js/script.js' %}"></script>
</body>
</html>
