{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contrasena - Legajo</title>
    <link rel="stylesheet" href="{% static 'web/css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'web/css/password-recovery.css' %}">
</head>
<body>
    <button id="toggleModo" class="modo-toggle">Modo Claro</button>

    <div class="container-recuperar">
        <div class="header-recuperar">
            <div class="icon-recuperar">Rec</div>
            <h1>Recuperar Contrasena</h1>
            <p>Ingresa tu correo para recibir un enlace de recuperacion</p>
        </div>

        <form action="{% url 'forgot_password' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Correo Electronico</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" required>
            </div>

            <button type="submit" class="btn-primary">Enviar Enlace</button>
        </form>

        <div class="footer-recuperar">
            <p>Recordaste tu contrasena? <a href="{% url 'login' %}">Volver a login</a></p>
        </div>
    </div>

    <script src="{% static 'web/js/script.js' %}"></script>
</body>
</html>
