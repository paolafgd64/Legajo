{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Legajo</title>
    <link rel="stylesheet" href="{% static 'web/css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'web/css/password-recovery.css' %}">
</head>
<body>
    <button id="toggleModo" class="modo-toggle">☀️</button>

    <div class="container-recuperar">
        <div class="header-recuperar">
            <div class="icon-recuperar">🔐</div>
            <h1>Recuperar Contraseña</h1>
            <p>Ingresa tu correo para recibir un enlace de recuperación</p>
        </div>

        <form action="{% url 'forgot_password' %}" method="post">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" required>
            </div>

            <button type="submit" class="btn-primary"> Enviar Enlace</button>

            <p th:if="${error}" class="mensaje error">
                <strong> Error:</strong> <span th:text="${error}"></span>
            </p>

            <p th:if="${message}" class="mensaje success">
                <strong> Éxito:</strong> <span th:text="${message}"></span>
            </p>

            <a th:if="${devLink}" th:href="${devLink}" class="dev-link">
                 Restablece aquí tu contraseña
            </a>
        </form>

        <!-- Opción alternativa: actualizar contraseña directamente por correo (menos seguro) -->
        <div class="divider">o</div>
        <div class="update-section">
            <button id="toggleUpdateForm" class="btn-link">Actualizar contraseña directamente</button>

            <form id="updatePasswordForm" action="{% url 'update_password' %}" method="post" style="display:none; margin-top:12px;">
                <div class="form-group">
                    <label for="emailUpdate">Correo Electrónico</label>
                    <input type="email" id="emailUpdate" name="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">Nueva Contraseña</label>
                    <input type="password" id="newPassword" name="password" minlength="6" placeholder="Mínimo 6 caracteres" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" minlength="6" placeholder="Repite la contraseña" required>
                </div>
                <p id="updateError" class="mensaje error" style="display:none;"></p>
                <button type="submit" class="btn-primary">Actualizar Contraseña</button>
            </form>
        </div>

        <div class="footer-recuperar">
            <p>¿Recordaste tu contraseña? <a href="{% url 'login' %}">Volver a login</a></p>
        </div>
    </div>

    <script src="{% static 'web/js/script.js' %}"></script>
    <script>
        // Mostrar / ocultar formulario de update directo
        document.addEventListener('DOMContentLoaded', function() {
            const toggleBtn = document.getElementById('toggleUpdateForm');
            const form = document.getElementById('updatePasswordForm');
            const newPwd = document.getElementById('newPassword');
            const confPwd = document.getElementById('confirmPassword');
            const err = document.getElementById('updateError');

            if (toggleBtn && form) {
                toggleBtn.addEventListener('click', function(e){
                    e.preventDefault();
                    form.style.display = form.style.display === 'none' ? 'block' : 'none';
                });
            }

            if (form) {
                form.addEventListener('submit', function(e){
                    err.style.display = 'none';
                    if (!newPwd || !confPwd) return;
                    if (newPwd.value.length < 6) {
                        e.preventDefault();
                        err.textContent = 'La contraseña debe tener al menos 6 caracteres.';
                        err.style.display = 'block';
                        return;
                    }
                    if (newPwd.value !== confPwd.value) {
                        e.preventDefault();
                        err.textContent = 'Las contraseñas no coinciden.';
                        err.style.display = 'block';
                        return;
                    }
                });
            }
        });
    </script>
</body>
</html>
