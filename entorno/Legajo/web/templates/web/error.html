{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Legajo</title>
    <link rel="stylesheet" href="{% static 'web/estilos/estilos_error.css' %}">
</head>
<body>
    <button id="toggleModo" class="modo-toggle">☀️ Modo Claro</button>
    <div class="contenedor-error">
        <h1>⚠️ Error</h1>
        <h2>Algo salió mal</h2>
        <p id="errorMsg" th:text="${error} ?: 'Ocurrió un error inesperado. Intenta de nuevo más tarde.'"></p>
        <a href="{% url 'login' %}" class="boton">Volver al login</a>
    </div>
    <script src="{% static 'web/js/script.js' %}"></script>
</body>
</html>
