{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registrar Libro</title>
    <link rel="stylesheet" href="{% static 'web/css/styles.css' %}">
</head>
<body>
    <button id="toggleModo" class="modo-toggle">☀️ Modo Claro</button>
    <div class="formulario">
        <form id="registrarLibroForm" action="/api/libros" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <h2><i class="fas fa-book"></i> Registrar Libro</h2>
            {% if error_registro_libro %}
            <div style="margin-bottom:12px;color:#b00020;">{{ error_registro_libro }}</div>
            {% endif %}

            <input type="text" id="titulo" name="titulo" placeholder="Titulo del libro" required>
            <input type="text" id="autor" name="autor" placeholder="Autor" required>

            <label for="sinopsis"></label>
            <textarea id="sinopsis" name="sinopsis" rows="4" placeholder="Escribe aqui la sinopsis..."></textarea>

            <select id="genero" name="genero" required>
                <option value="">Seleccione un genero</option>
                <option value="Ficcion">Ficcion</option>
                <option value="Fantasia">Fantasia</option>
                <option value="Romance">Romance</option>
                <option value="Misterio">Misterio</option>
                <option value="Biografia">Biografia</option>
                <option value="Autoayuda">Autoayuda</option>
            </select>

            <input type="hidden" id="estado" name="estado" value="Publicado">

            <div class="form-grupo">
                <label for="imagen" class="label-file">Seleccionar portada</label>
                <input type="file" id="imagen" name="imagen" accept="image/*">
            </div>

            <button type="submit"><i class="fas fa-save"></i> Guardar Libro</button>
        </form>
    </div>
    <script src="{% static 'web/js/script.js' %}"></script>
</body>
</html>
