{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% if modo_edicion %}Editar Libro{% else %}Registrar Libro{% endif %}</title>
    <link rel="stylesheet" href="{% static 'usuarios/css/styles.css' %}?v=20260430b">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <a href="{% url back_url_name %}" class="btn-volver">&larr;</a>
    <button id="toggleModo" class="modo-toggle">Modo Claro</button>
    <div class="formulario formulario-libro">
        <form id="registrarLibroForm" action="/api/libros" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="hidden" id="modoEdicion" value="{% if modo_edicion %}true{% else %}false{% endif %}">
            <input type="hidden" id="libroId" value="{% if libro_edicion %}{{ libro_edicion.id }}{% endif %}">
            <input type="hidden" id="source" value="{{ source|default:'' }}">
            <input type="hidden" id="redirectAfterSave" value="{% url back_url_name %}">
            <input type="hidden" id="currentImageUrl" value="{% if libro_edicion %}{{ libro_edicion.url_imagen }}{% endif %}">

            <div class="book-form-icon">
                <i class="fas fa-book-open"></i>
            </div>
            <h2><i class="fas fa-book"></i> {% if modo_edicion %}Editar Libro{% else %}Registrar Libro{% endif %}</h2>

            {% if error_registro_libro %}
            <div class="book-form-alert">{{ error_registro_libro }}</div>
            {% endif %}

            <input type="text" id="titulo" name="titulo" placeholder="Titulo del libro" value="{% if libro_edicion %}{{ libro_edicion.titulo }}{% endif %}" required>
            <input
                type="text"
                id="autor"
                name="autor"
                placeholder="Autor"
                list="autoresPredeterminados"
                autocomplete="off"
                value="{% if libro_edicion %}{{ libro_edicion.autor }}{% endif %}"
                required
            >
            <datalist id="autoresPredeterminados">
                <option value="Gabriel Garcia Marquez"></option>
                <option value="Jorge Luis Borges"></option>
                <option value="Isabel Allende"></option>
                <option value="Mario Vargas Llosa"></option>
                <option value="Julio Cortazar"></option>
                <option value="Miguel de Cervantes"></option>
                <option value="William Shakespeare"></option>
                <option value="Jane Austen"></option>
                <option value="Fyodor Dostoevsky"></option>
                <option value="Leo Tolstoy"></option>
                <option value="Virginia Woolf"></option>
                <option value="Franz Kafka"></option>
                <option value="George Orwell"></option>
                <option value="Agatha Christie"></option>
                <option value="Stephen King"></option>
            </datalist>

            <label for="sinopsis"></label>
            <textarea id="sinopsis" name="sinopsis" rows="4" placeholder="Escribe aqui la sinopsis...">{% if libro_edicion %}{{ libro_edicion.sinopsis }}{% endif %}</textarea>

            <select id="genero" name="genero" required>
                <option value="">Seleccione un genero</option>
                <option value="Ficcion" {% if libro_edicion.genero == 'Ficcion' %}selected{% endif %}>Ficcion</option>
                <option value="Fantasia" {% if libro_edicion.genero == 'Fantasia' %}selected{% endif %}>Fantasia</option>
                <option value="Romance" {% if libro_edicion.genero == 'Romance' %}selected{% endif %}>Romance</option>
                <option value="Misterio" {% if libro_edicion.genero == 'Misterio' %}selected{% endif %}>Misterio</option>
                <option value="Biografia" {% if libro_edicion.genero == 'Biografia' %}selected{% endif %}>Biografia</option>
                <option value="Autoayuda" {% if libro_edicion.genero == 'Autoayuda' %}selected{% endif %}>Autoayuda</option>
            </select>

            <input type="hidden" id="estado" name="estado" value="{% if libro_edicion %}{{ libro_edicion.estado }}{% else %}Publicado{% endif %}">

            <label for="cantidadLibros">¿Tienes mas libros de este?</label>
            <select id="cantidadLibros" name="cantidadLibros" required>
                <option value="1" {% if not libro_edicion or libro_edicion.stock == 1 %}selected{% endif %}>1</option>
                <option value="2" {% if libro_edicion.stock == 2 %}selected{% endif %}>2</option>
                <option value="3" {% if libro_edicion.stock == 3 %}selected{% endif %}>3</option>
                <option value="4" {% if libro_edicion.stock == 4 %}selected{% endif %}>4</option>
                <option value="5" {% if libro_edicion.stock == 5 %}selected{% endif %}>5</option>
                <option value="6" {% if libro_edicion.stock == 6 %}selected{% endif %}>6</option>
                <option value="7" {% if libro_edicion.stock == 7 %}selected{% endif %}>7</option>
                <option value="8" {% if libro_edicion.stock == 8 %}selected{% endif %}>8</option>
                <option value="9" {% if libro_edicion.stock == 9 %}selected{% endif %}>9</option>
                <option value="10" {% if libro_edicion.stock == 10 %}selected{% endif %}>10</option>
            </select>

            <div class="form-grupo">
                <label for="imagen" class="label-file">{% if modo_edicion %}Cambiar portada{% else %}Seleccionar portada{% endif %}</label>
                <input type="file" id="imagen" name="imagen" accept="image/*">
            </div>

            <div
                class="form-grupo book-cover-preview-wrap"
                style="width:180px; height:240px; min-width:180px; min-height:240px; max-width:180px; max-height:240px; overflow:hidden; margin-left:auto; margin-right:auto;"
            >
                <img
                    id="portadaPreview"
                    class="book-cover-preview"
                    src=""
                    style="display:none; width:180px; height:240px; min-width:180px; min-height:240px; max-width:180px; max-height:240px; object-fit:cover;"
                    alt="Portada seleccionada"
                >
            </div>

            <button type="submit"><i class="fas fa-save"></i> {% if modo_edicion %}Guardar cambios{% else %}Guardar Libro{% endif %}</button>
        </form>
    </div>
    <script src="{% static 'usuarios/js/script.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{% static 'usuarios/js/swal-theme.js' %}?v=20260430a"></script>
    <script src="{% static 'gestion_libros/js/registrarLibro.js' %}?v=20260505a"></script>
</body>
</html>
