{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion</title>
    <link rel="stylesheet" href="{% static 'usuarios/css/styles.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <a href="{% url 'index' %}" class="btn-volver">&larr;</a>
    <button id="toggleModo" class="modo-toggle">Modo Claro</button>

    <section class="formulario">
        <form id="loginForm">
            {% csrf_token %}

            <div class="logo-form"></div>
            <h2>Iniciar sesion</h2>
            <p class="form-heading-copy">Ingresa con tu correo y tu contrasena. Si hay un problema, te lo mostraremos aqui mismo.</p>

            <input type="email" id="correo" name="correo" placeholder="Correo electronico" required>

            <div class="input-pass">
                <input type="password" id="clave" name="clave" placeholder="Contrasena" required>
                <i class="toggle-pass fas fa-eye" onclick="verClave('clave', this)"></i>
                <a href="{% url 'forgot_password' %}">Olvidaste tu contrasena?</a>
            </div>

            <button type="submit">Ingresar</button>
            <div id="loginMensaje" class="form-status" role="alert" aria-live="polite"></div>
        </form>
    </section>

    <script src="{% static 'usuarios/js/script.js' %}"></script>
    <script src="{% static 'usuarios/js/validaciones.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const mensaje = document.getElementById('loginMensaje');
            const correo = document.getElementById('correo');
            const clave = document.getElementById('clave');

            function getCSRFToken() {
                return document.querySelector('[name=csrfmiddlewaretoken]').value;
            }

            [correo, clave].forEach((input) => {
                input.addEventListener('input', () => {
                    input.classList.remove('input-error');
                    limpiarMensajeFormulario(mensaje);
                });
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                limpiarMensajeFormulario(mensaje);
                marcarCamposInvalidos([]);

                if (!validarEmail(correo.value)) {
                    marcarCamposInvalidos([correo]);
                    mostrarMensajeFormulario(mensaje, 'Ingresa un correo electronico valido.');
                    return;
                }

                if (!clave.value.trim()) {
                    marcarCamposInvalidos([clave]);
                    mostrarMensajeFormulario(mensaje, 'Ingresa tu contrasena para continuar.');
                    return;
                }

                try {
                    const res = await fetch('/api/login/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCSRFToken()
                        },
                        body: JSON.stringify({
                            correo: correo.value,
                            clave: clave.value
                        })
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        marcarCamposInvalidos([correo, clave]);
                        mostrarMensajeFormulario(mensaje, data.message || 'Credenciales invalidas.');
                        return;
                    }

                    localStorage.setItem('jwtToken', data.token);

                    const role = (data.role || '').toLowerCase();
                    if (role.includes('admin')) {
                        window.location.href = "{% url 'dashboard_admin' %}";
                    } else {
                        window.location.href = "{% url 'dashboard_usuario' %}";
                    }
                } catch (err) {
                    console.error(err);
                    mostrarMensajeFormulario(mensaje, 'Error de red: ' + err.message);
                }
            });
        });
    </script>
</body>
</html>
